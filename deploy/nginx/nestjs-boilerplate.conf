# Nginx reverse proxy — multi-instance configuration.
#
# Replace `example.com` with your actual domain before use.
#
# Architecture:
#   Client → Nginx (80/443) → PM2 cluster (API :3000) / Next.js (:8000)
#
# When PM2 runs the API in cluster mode all workers share port 3000;
# Nginx talks to a single upstream address and PM2 distributes internally.
# For multi-server setups, list each server IP under api_upstream.

# ─── Rate limiting zones (defined at http level, placed here via include) ────
# Adjust burst/rate to match your expected traffic.
limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=web_limit:10m  rate=60r/s;

limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ─── WebSocket / SSE upgrade map ─────────────────────────────────────────────
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

# ─── Upstream pools ──────────────────────────────────────────────────────────
# Single-server: PM2 cluster on localhost handles load balancing internally.
# Multi-server:  add additional `server <ip>:3000;` lines below.
upstream api_upstream {
  least_conn;                     # send new requests to least-busy worker
  server 127.0.0.1:3000;
  # server 10.0.0.2:3000;         # additional node for multi-server scale-out
  keepalive 64;                   # persistent connections to upstream
  keepalive_requests 1000;
  keepalive_timeout 60s;
}

upstream web_upstream {
  server 127.0.0.1:8000;
  keepalive 32;
  keepalive_requests 500;
  keepalive_timeout 60s;
}

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
  listen 80;
  listen [::]:80;
  server_name example.com www.example.com;

  # Let's Encrypt ACME challenge
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# ─── HTTPS main server ────────────────────────────────────────────────────────
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;

  server_name example.com www.example.com;

  # ── TLS ──────────────────────────────────────────────────────────────────
  # Managed by Certbot — paths are populated after: certbot --nginx -d example.com
  ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
  include             /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 1d;
  ssl_session_tickets off;

  # ── Security headers ─────────────────────────────────────────────────────
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options    "nosniff"                                      always;
  add_header X-Frame-Options           "SAMEORIGIN"                                   always;
  add_header X-XSS-Protection          "1; mode=block"                                always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
  add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"     always;

  # ── Compression ──────────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    text/plain text/css text/javascript text/xml text/x-component
    application/json application/javascript application/xml application/rss+xml
    font/truetype font/opentype image/svg+xml;

  # ── Request limits ───────────────────────────────────────────────────────
  client_max_body_size    20m;
  client_body_buffer_size 128k;
  client_header_timeout   15s;
  client_body_timeout     30s;
  send_timeout            30s;

  # ── Connection limit per IP ───────────────────────────────────────────────
  limit_conn conn_limit 50;

  # ── Common proxy settings ─────────────────────────────────────────────────
  proxy_http_version 1.1;
  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host  $host;
  proxy_set_header X-Forwarded-Port  $server_port;

  # WebSocket / SSE upgrade
  proxy_set_header Upgrade    $http_upgrade;
  proxy_set_header Connection $connection_upgrade;

  proxy_connect_timeout 10s;
  proxy_send_timeout    60s;
  proxy_read_timeout    60s;
  proxy_buffering       on;
  proxy_buffer_size     16k;
  proxy_buffers         8 16k;

  # ── Health check (no rate limit, no logging) ──────────────────────────────
  location = /health {
    proxy_pass http://api_upstream;
    access_log off;
  }

  location /health/ {
    proxy_pass http://api_upstream;
    access_log off;
  }

  # ── Auth endpoints — tight rate limit ────────────────────────────────────
  location /api/auth/ {
    limit_req zone=auth_limit burst=10 nodelay;
    limit_req_status 429;
    proxy_pass http://api_upstream;
    proxy_read_timeout 30s;
  }

  # ── API ───────────────────────────────────────────────────────────────────
  location /api/ {
    limit_req zone=api_limit burst=50 nodelay;
    limit_req_status 429;
    proxy_pass http://api_upstream;
    proxy_read_timeout 60s;
  }

  # ── API docs (dev/staging only — block in production if desired) ──────────
  location /swagger {
    proxy_pass http://api_upstream;
    proxy_read_timeout 30s;
  }

  location /docs {
    proxy_pass http://api_upstream;
    proxy_read_timeout 30s;
  }

  location /openapi.yaml {
    proxy_pass http://api_upstream;
    proxy_read_timeout 10s;
  }

  # ── Next.js static assets — long-lived cache ─────────────────────────────
  location /_next/static/ {
    proxy_pass http://web_upstream;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
  }

  # ── Next.js image optimisation ────────────────────────────────────────────
  location /_next/image {
    proxy_pass http://web_upstream;
    proxy_cache_valid 200 60m;
  }

  # ── Everything else → Next.js ─────────────────────────────────────────────
  location / {
    limit_req zone=web_limit burst=100 nodelay;
    limit_req_status 429;
    proxy_pass http://web_upstream;
    proxy_read_timeout 60s;
  }
}
