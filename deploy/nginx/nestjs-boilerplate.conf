# Nginx reverse proxy for this monorepo (PM2-managed).
#
# Replace `example.com` with your domain.
#
# Upstreams:
# - API (NestJS): http://127.0.0.1:3000
# - Web (Next.js): http://127.0.0.1:8000

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream api_upstream {
  server 127.0.0.1:3000;
  keepalive 32;
}

upstream web_upstream {
  server 127.0.0.1:8000;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;

  server_name example.com www.example.com;

  # Increase if you expect large uploads
  client_max_body_size 20m;

  # Common proxy headers
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # Websockets / SSE compatibility
  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $connection_upgrade;

  # API under /api
  location /api/ {
    proxy_pass http://api_upstream;
    proxy_read_timeout 60s;
  }

  # (Optional) swagger/docs paths might be mounted elsewhere in API; keep them on API too.
  # location /swagger {
  #   proxy_pass http://api_upstream;
  # }
  # location /docs {
  #   proxy_pass http://api_upstream;
  # }

  # Everything else -> Next.js
  location / {
    proxy_pass http://web_upstream;
    proxy_read_timeout 60s;
  }
}
